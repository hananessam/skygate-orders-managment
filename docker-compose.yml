services:
  db:
    image: postgres:16-alpine
    container_name: skygate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: skygate_orders
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d skygate_orders']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: skygate-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skygate-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/skygate_orders?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENAPI_SERVER_URL: http://localhost:3000
    ports:
      - '3000:3000'
    command: sh -c "npm run db:generate && npx prisma migrate deploy && npm run db:seed && npm run start:prod"

volumes:
  postgres_data:
